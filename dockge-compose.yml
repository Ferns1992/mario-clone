name: mario-clone
services:
  mario:
    image: mario-clone:latest
    container_name: mario-clone
    restart: unless-stopped
    ports:
      - "3030:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/mario.db
    healthcheck:
      test: wget -qO- http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
